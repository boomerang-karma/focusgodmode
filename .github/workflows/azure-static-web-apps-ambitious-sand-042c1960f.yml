# Azure Static Web App: ambitious-sand-042c1960f
# Pre-builds Expo web → dist/, then uploads (skip Oryx).
# With skip_app_build: true, app_location must be the folder that already
# contains index.html (dist/), not the repo root.

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Expo web (static)
        run: npm run build
        env:
          CI: true
          EXPO_NO_TELEMETRY: 1

      - name: Verify dist output
        run: |
          ls -la dist/
          test -f dist/index.html

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_SAND_042C1960F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Prebuilt static site — point app_location at dist (has index.html)
          app_location: dist
          api_location: ''
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_SAND_042C1960F }}
          action: close
